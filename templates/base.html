<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    {{component:head}}
</head>
<body>
    {{component:header}}
    
    {{#if show_breadcrumb}}
        {{component:breadcrumb}}
    {{/if}}
    
    {{#if with_sidebar}}
    <div class="main-layout-container">
        <main class="main-content main-content-area with-sidebar">
            {{component:page_content}}
        </main>
        <aside class="sidebar-right">
            <div class="sidebar-content">
                {{component:ad-skyscraper-right}}
            </div>
        </aside>
    </div>
    {{else}}
    <main class="main-content">
        {{component:page_content}}
    </main>
    {{/if}}
    
    {{component:footer}}
    
    {{component:toast}}
    
    {{component:language-modal}}
    
    <!-- JavaScript Module - Load after critical content -->
    <script src="{{js_path}}/app.js" type="module" defer></script>
</body>
</html>
