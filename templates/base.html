<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    {{component:head}}
</head>
<body>
    {{component:header-mega-menu}}
    
    {{#if show_breadcrumb}}
        {{component:breadcrumb}}
    {{/if}}
    
    <main class="main-content">
        {{component:page_content}}
    </main>
    
    {{component:footer-optimized}}
    
    {{component:toast}}
    
    {{component:language-modal}}
    
    <!-- i18n Initialization - Must load after i18next CDN but before other scripts -->
    <script type="module" src="{{js_path}}/i18n.js"></script>
    
    <!-- Core Optimized JavaScript - Phase 1.1 Performance Optimization -->
    <!-- Merged core functionality modules, reduced HTTP requests, maintaining all business logic -->
    <script src="{{js_path}}/core-optimized.js" defer></script>
    
    <!-- Phase 0.2 JavaScript - Mega Menu Navigation -->
    <script src="{{js_path}}/mega-menu.js" defer></script>
    <!-- Internal Links Module (lazy-loaded, robust on mobile browsers) -->
    <script>
    (function() {
        var loaded = false;

        function injectInternalLinksModule() {
            if (loaded) return;
            loaded = true;

            var script = document.createElement('script');
            script.type = 'module';
            script.src = "{{js_path}}/internal-links.js";
            script.onerror = function() {
                // Keep page stable even if module loading fails.
            };
            document.body.appendChild(script);
        }

        function scheduleLoad() {
            if ("requestIdleCallback" in window) {
                requestIdleCallback(injectInternalLinksModule, { timeout: 1500 });
            } else {
                setTimeout(injectInternalLinksModule, 600);
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", scheduleLoad, { once: true });
            // Fallback for edge timing cases on some mobile browsers.
            setTimeout(injectInternalLinksModule, 2500);
        } else {
            scheduleLoad();
        }
    })();
    </script>

    <!-- Scroll Animations - Visual Enhancements -->
    <script src="{{js_path}}/scroll-animations.js" defer></script>
</body>
</html>
