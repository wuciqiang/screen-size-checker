<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    {{component:head}}
    
    <!-- Hub页面性能优化 -->
    <link rel="preconnect" href="https://quickchart.io" crossorigin>
    <link rel="dns-prefetch" href="https://quickchart.io">
    
    <!-- Hub页面特定CSS -->
    <link rel="stylesheet" href="{{css_path}}/hub.css">
</head>
<body data-theme="light" class="hub-page-body">
    <!-- 头部导航 -->
    {{component:header-mega-menu}}
    
    <!-- 面包屑导航 -->
    {{#if show_breadcrumb}}
    {{component:breadcrumb}}
    {{/if}}
    
    <main class="main-content hub-main">
        <div class="hub-container">
            <!-- Hub页面内容 -->
            <div class="hub-content-wrapper">
                {{page_content}}
            </div>
        </div>
    </main>
    
    <!-- 页脚 -->
    {{component:footer-optimized}}
    
    <!-- 语言选择模态框 -->
    {{component:language-modal}}
    
    <!-- 通知组件 -->
    {{component:toast}}
    
    <!-- JavaScript -->
    <script>
        (function() {
            function loadMobileImageOptimizer() {
                if (!window.matchMedia('(max-width: 768px)').matches) {
                    return;
                }

                if (!document.querySelector('.hub-content-wrapper img')) {
                    return;
                }

                const script = document.createElement('script');
                script.src = '{{js_path}}/mobile-image-optimizer.js';
                script.defer = true;
                document.body.appendChild(script);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    setTimeout(loadMobileImageOptimizer, 300);
                }, { once: true });
            } else {
                setTimeout(loadMobileImageOptimizer, 300);
            }
        })();
    </script>
    <script src="{{js_path}}/blog.js" type="module"></script>
    <script src="{{js_path}}/app.js" type="module"></script>
    <script src="{{js_path}}/core-optimized.js" defer></script>
    
    <!-- Phase 0.2 JavaScript - Mega Menu Navigation -->
    <script src="{{js_path}}/mega-menu.js" defer></script>
    
</body>
</html>
