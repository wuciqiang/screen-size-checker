<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    {{component:head}}
    {{#if is_simulator}}
    <link rel="stylesheet" href="{{css_path}}/simulator.css">
    {{/if}}
</head>
<body>
    {{component:header-mega-menu}}
    
    {{component:breadcrumb}}
    
    <main class="main-content">
        {{page_content}}
    </main>

    {{component:footer-optimized}}
    
    {{component:toast}}
    
    {{component:language-modal}}
    
    <!-- JavaScript Module -->
    <script src="{{js_path}}/app.js" type="module"></script>
    
    <!-- Phase 0.2 JavaScript - Mega Menu Navigation -->
    <script src="{{js_path}}/mega-menu.js" defer></script>
    
    <!-- Internal Links Module -->
    <script type="module" src="{{js_path}}/internal-links.js" defer></script>
</body>
</html>
