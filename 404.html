<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,follow">
    <title>Page Not Found - Screen Size Checker</title>
    <style>
        :root {
            color-scheme: light;
            --text: #1f2937;
            --muted: #5f6b7a;
            --border: #d9e2ec;
            --accent: #0066cc;
            --bg: #f7fafc;
            --panel: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        main {
            width: min(100%, 560px);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
        }

        .status {
            margin: 0 0 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 32px;
            line-height: 1.2;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            display: inline-block;
            color: #ffffff;
            background: var(--accent);
            padding: 11px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <p class="status">404</p>
        <h1>Page not found</h1>
        <p>The page or file you requested does not exist. Use the homepage to check your screen size or find the right tool.</p>
        <a href="/">Go to homepage</a>
    </main>
</body>
</html>
