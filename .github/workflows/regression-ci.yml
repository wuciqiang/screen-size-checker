name: Regression CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run regression build and checks
        run: npm run test:regression
