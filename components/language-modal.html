<!-- Language Selection Modal -->
<div class="language-modal" id="language-modal" role="dialog" aria-labelledby="language-modal-title" aria-hidden="true">
    <div class="language-modal-backdrop" id="language-modal-backdrop"></div>
    <div class="language-modal-content">
        <div class="language-modal-header">
            <h3 id="language-modal-title" class="language-modal-title">
                <span class="modal-title-primary" data-i18n="language_modal_title">Choose Language</span>
                <span class="modal-title-secondary">&#36873;&#25321;&#35821;&#35328; / Choose Language</span>
            </h3>
            <button class="language-modal-close" id="language-modal-close" aria-label="Close language selection">
                <span class="close-icon">&times;</span>
            </button>
        </div>
        <div class="language-modal-body">
            <div class="language-grid">
                <!-- Primary Languages (Fully Translated) -->
                <a href="#" class="language-card active" data-lang="en" data-lang-name="English">
                    <span class="flag fi fi-us"></span>
                    <div class="lang-name">English</div>
                    <div class="lang-code">EN</div>
                </a>

                <a href="#" class="language-card active" data-lang="zh" data-lang-name="&#20013;&#25991;">
                    <span class="flag fi fi-cn"></span>
                    <div class="lang-name">&#20013;&#25991;</div>
                    <div class="lang-code">ZH</div>
                </a>

                <a href="#" class="language-card active" data-lang="de" data-lang-name="Deutsch">
                    <span class="flag fi fi-de"></span>
                    <div class="lang-name">Deutsch</div>
                    <div class="lang-code">DE</div>
                </a>

                <a href="#" class="language-card active" data-lang="es" data-lang-name="Espa&ntilde;ol">
                    <span class="flag fi fi-es"></span>
                    <div class="lang-name">Espa&ntilde;ol</div>
                    <div class="lang-code">ES</div>
                </a>

                <a href="#" class="language-card active" data-lang="pt" data-lang-name="Portugu&ecirc;s">
                    <span class="flag fi fi-pt"></span>
                    <div class="lang-name">Portugu&ecirc;s</div>
                    <div class="lang-code">PT</div>
                </a>

                <a href="#" class="language-card active" data-lang="fr" data-lang-name="Fran&ccedil;ais">
                    <span class="flag fi fi-fr"></span>
                    <div class="lang-name">Fran&ccedil;ais</div>
                    <div class="lang-code">FR</div>
                </a>

                <!-- Secondary Languages (Coming Soon) -->
                <a href="#" class="language-card disabled" data-lang="it" data-lang-name="Italiano">
                    <span class="flag fi fi-it"></span>
                    <div class="lang-name">Italiano</div>
                    <div class="lang-code">IT</div>
                </a>

                <a href="#" class="language-card disabled" data-lang="ja" data-lang-name="&#26085;&#26412;&#35486;">
                    <span class="flag fi fi-jp"></span>
                    <div class="lang-name">&#26085;&#26412;&#35486;</div>
                    <div class="lang-code">JA</div>
                </a>

                <a href="#" class="language-card disabled" data-lang="ko" data-lang-name="&#54620;&#44397;&#50612;">
                    <span class="flag fi fi-kr"></span>
                    <div class="lang-name">&#54620;&#44397;&#50612;</div>
                    <div class="lang-code">KO</div>
                </a>

                <a href="#" class="language-card disabled" data-lang="ru" data-lang-name="&#1056;&#1091;&#1089;&#1089;&#1082;&#1080;&#1081;">
                    <span class="flag fi fi-ru"></span>
                    <div class="lang-name">&#1056;&#1091;&#1089;&#1089;&#1082;&#1080;&#1081;</div>
                    <div class="lang-code">RU</div>
                </a>
            </div>
        </div>
    </div>
</div>
